<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Changhs Tools</title>
  <style>
    :root {
      --bg-1: #f3f7ff;
      --bg-2: #e7fff3;
      --ink: #1d2433;
      --muted: #5a6477;
      --card: #ffffff;
      --card-border: #d9e2f5;
      --btn-2: #1769ff;
      --btn-3: #008a59;
      --btn-text: #ffffff;
      --shadow: 0 12px 30px rgba(26, 46, 84, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 500px at -10% -20%, #d8e6ff 0%, transparent 60%),
        radial-gradient(1200px 500px at 110% 120%, #cff6dd 0%, transparent 60%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .panel {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 3.3vw, 36px);
      letter-spacing: 0.02em;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.55;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .card {
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 16px;
      background: #fcfdff;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .card p {
      margin: 0 0 14px;
      font-size: 14px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      color: var(--btn-text);
      font-weight: 700;
      letter-spacing: 0.01em;
      border-radius: 10px;
      padding: 10px 14px;
      transition: transform 140ms ease, box-shadow 140ms ease;
      will-change: transform;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.14);
    }

    .btn.tool2 {
      background: var(--btn-2);
    }

    .btn.tool3 {
      background: var(--btn-3);
    }

    .links {
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .links a {
      color: inherit;
    }

    @media (max-width: 680px) {
      .panel {
        padding: 22px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Changhs Tool Hub</h1>
    <p>Select a tool below to continue.</p>
    <section class="grid">
      <article class="card">
        <h2>INCOMEBUILDER</h2>
        <p>C-end revenue summary tool.</p>
        <a class="btn tool2" href="/INCOMEBUILDER/">Open INCOMEBUILDER</a>
      </article>
      <article class="card">
        <h2>Tool 3</h2>
        <p>Warehouse merge and processing tool.</p>
        <a class="btn tool3" href="/tool3/">Open Tool 3</a>
      </article>
    </section>
    <div class="links">
      Direct links:
      <a href="/INCOMEBUILDER/">/INCOMEBUILDER/</a>
      and
      <a href="/tool3/">/tool3/</a>
    </div>
  </main>
</body>
</html>
